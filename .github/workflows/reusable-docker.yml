name: Reusable Docker Build

on:
  workflow_call:

    inputs:
      image_name:
        required: true
        type: string

      tag:
        required: true
        type: string

    secrets:
      docker_username:
        required: true

      docker_token:
        required: true

    outputs:
      image_url:
        description: "Docker image path"
        value: ${{ jobs.docker.outputs.image }}

jobs:
  docker:
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.docker_username }}
          password: ${{ secrets.docker_token }}

      - name: Build and push image
        run: |
          IMAGE=${{ secrets.docker_username }}/${{ inputs.image_name }}:${{ inputs.tag }}
          docker build -t $IMAGE .
          docker push $IMAGE

      - name: Save image output
        id: meta
        run: echo "image=${{ secrets.docker_username }}/${{ inputs.image_name }}:${{ inputs.tag }}" >> $GITHUB_OUTPUT
