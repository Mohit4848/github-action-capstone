name: Main CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  build-test:
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      python_version: "3.11"
      run_tests: true

  docker-build:
    needs: build-test

    uses: ./.github/workflows/reusable-docker.yml

    with:
      image_name: myapp
      tag: latest

    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKER_TOKEN }}

  deploy:
    needs: docker-build
    runs-on: ubuntu-latest

    environment: production

    steps:
      - name: Deploy step
        run: |
          echo "Deploying image ${{ needs.docker-build.outputs.image_url }}"
